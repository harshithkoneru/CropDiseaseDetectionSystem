<!DOCTYPE html>
<html>
<head>

<title>Crop Disease Detection</title>

<link rel="stylesheet" href="Style.css">

</head>

<body>

<div class="container">

<h1>Crop Disease Detection System</h1>
<p>Upload crop details to detect possible disease</p>

<form action="api/result.jsp" method="post">

<label>Farmer Name</label>
<input type="text" name="farmer" required>

<label>Crop Name</label>
<select name="crop">

<option value="Rice">Rice</option>
<option value="Wheat">Wheat</option>
<option value="Tomato">Tomato</option>
<option value="Potato">Potato</option>

</select>

<label>Symptoms</label>
<textarea name="symptoms" placeholder="Describe symptoms..." required></textarea>

<button type="submit">Detect Disease</button>

</form>

</div>

</body>
</html>
